name: Validate Flutter

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop
    paths:
      - "lib/**"
      - "test/**"
      - "integration_test/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format, Analyze and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        shell: bash
        run: |
          targets=(lib test)

          if [ -d integration_test ]; then
            targets+=(integration_test)
          fi

          dart format --output=none --set-exit-if-changed "${targets[@]}"

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --fatal-warnings

      - name: Run unit tests
        run: flutter test --reporter expanded
