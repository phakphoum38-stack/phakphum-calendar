name: Validate Flutter

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop
    paths:
      - "lib/**"
      - "test/**"
      - "integration_test/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/validate.yml"

permissions:
  contents: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format, Analyze and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Format Dart files
        shell: bash
        run: |
          targets=(lib test)

          if [ -d integration_test ]; then
            targets+=(integration_test)
          fi

          dart format "${targets[@]}"

      - name: Commit generated changes
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add lib test pubspec.lock

          if [ -d integration_test ]; then
            git add integration_test
          fi

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "style: format Dart files and update lockfile"
          git push

      - name: Verify pull request has no generated changes
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if ! git diff --quiet; then
            echo "Generated files or formatting are not up to date."
            git diff --stat
            git diff
            exit 1
          fi

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --fatal-warnings

      - name: Run unit tests
        run: flutter test --reporter expanded
