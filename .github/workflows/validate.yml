name: Validate Flutter

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    paths:
      - "lib/**"
      - "test/**"
      - "integration_test/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/validate.yml"

permissions:
  contents: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format, analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Format Dart files
        shell: bash
        run: |
          targets=(lib test)

          if [ -d integration_test ]; then
            targets+=(integration_test)
          fi

          dart format "${targets[@]}"

      - name: Commit formatting changes
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "All Dart files are already formatted."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add lib test

          if [ -d integration_test ]; then
            git add integration_test
          fi

          git commit -m "style: format Dart source files"
          git push

      - name: Verify formatting on pull request
        if: github.event_name == 'pull_request'
        run: git diff --exit-code

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --reporter expanded
