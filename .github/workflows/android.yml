name: Build Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "assets/**"
      - "android/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/android.yml"

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: APK and App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          flutter build apk --release \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="$GOOGLE_SERVER_CLIENT_ID"

      - name: Build release App Bundle
        env:
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          flutter build appbundle --release \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="$GOOGLE_SERVER_CLIENT_ID"

      - name: Prepare Android artifacts
        run: |
          mkdir -p dist/android
          cp build/app/outputs/flutter-apk/app-release.apk dist/android/phakphum-calendar.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/android/phakphum-calendar.aab
          cd dist/android
          sha256sum phakphum-calendar.apk phakphum-calendar.aab > SHA256SUMS.txt

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: phakphum-calendar-android
          path: dist/android
          if-no-files-found: error
          retention-days: 14
