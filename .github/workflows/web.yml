name: Build Web and Optional Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.*"
      - ".github/workflows/web.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build Flutter web
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          flutter build web --release --base-href "/$REPO_NAME/" \
            --dart-define=GOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="$GOOGLE_SERVER_CLIENT_ID"
      - uses: actions/upload-artifact@v6
        with:
          name: phakphum-calendar-web
          path: build/web
          if-no-files-found: error
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    # GitHub Free does not provide Pages for private repositories. The build
    # artifact remains available; deployment starts automatically if the
    # repository is made public or the account plan supports private Pages.
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event.repository.visibility == 'public'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
